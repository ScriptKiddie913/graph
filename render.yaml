# render.yaml — One-click deploy for Graph Intelligence System
# Push to GitHub → Render Dashboard → New Blueprint → connect repo

services:
  # ===== BACKEND =====
  - type: web
    name: graph-intel-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free  # 512MB RAM, 0.1 CPU (free tier)
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: PORT
        value: "3001"
      - key: MAX_NODES
        value: "400000"
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        sync: false
    healthCheckPath: /
    autoDeploy: true

  # ===== FRONTEND =====
  - type: web
    name: graph-intel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
